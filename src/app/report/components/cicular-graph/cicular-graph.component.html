

<div class="nose">
<ngx-charts-pie-grid
  [view]="view"
  [view]="[500, 300]" 
  scheme="forest"
  [results]="single"
  (select)="onSelect2($event)">
</ngx-charts-pie-grid>

<ngx-charts-pie-chart
[view]="view"
  [view]="[400, 300]" 
  scheme="cool"
  [results]="single2"
  [gradient]="true"
  [legend]="true"
  [legendPosition]="legendPosition"
  [labels]="false"
  [doughnut]="isDoughnut"
  (select)="onSelect($event)"
  (activate)="onActivate($event)"
  (deactivate)="onDeactivate($event)">
</ngx-charts-pie-chart>
</div>
